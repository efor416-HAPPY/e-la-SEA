name: ARA AI Modular Core CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Set up Python environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn openai langdetect pytest requests

    - name: Run code validation & lint check
      run: |
        python -m py_compile backend/main.py

    - name: Execute PyTest unit suite
      run: |
        # Run tests (mocking or unit tests if available)
        python -m pytest --ignore=ara-platform-v1
